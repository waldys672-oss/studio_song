{% extends "base.html" %}

{% block title %}طلب مخصص{% endblock %}

{% block content %}
<section class="order-page">
    <div class="container">
        <div class="order-form-card animate-on-scroll">
            <h1><i class="fas fa-pen-fancy" style="color: var(--accent); font-size: 0.8em;"></i> اطلب عمل <span class="accent-text">مخصص</span></h1>
            <p class="form-subtitle">أرسل تفاصيل طلبك وسنتواصل معك في أقرب وقت</p>

            <form method="POST" action="{{ url_for('orders.new_order') }}" id="orderForm">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                <div class="form-group">
                    <label class="form-label" for="names_requested"><i class="fas fa-user-tag"></i> الاسم / الأسماء المطلوبة *</label>
                    <input type="text" class="form-control" id="names_requested" name="names_requested" required placeholder="اسم الشخص الي تبي تسوي له عمل(زفة_شيلة ..)">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label" for="occasion_type"><i class="fas fa-calendar-star"></i> نوع المناسبة *</label>
                        <select class="form-control" id="occasion_type" name="occasion_type" required>
                            <option value="">اختر نوع المناسبة</option>
                            <option value="زفاف">زفاف</option>
                            <option value="خطوبة">خطوبة</option>
                            <option value="تخرج">تخرج</option>
                            <option value="مولود">مولود جديد</option>
                            <option value="نجاح">نجاح</option>
                            <option value="عيد">عيد</option>
                            <option value="مناسبة شخصية">مناسبة شخصية</option>
                            <option value="أخرى">أخرى</option>
                        </select>
                    </div>
                    <!-- <div class="form-group">
                        <label class="form-label" for="work_type"><i class="fas fa-music"></i> نوع العمل *</label>
                        <select class="form-control" id="work_type" name="work_type" required>
                            <option value="">اختر نوع العمل</option>
                            <option value="زفة">زفة</option>
                            <option value="شيلة">شيلة</option>
                            <option value="مقطع صوتي">مقطع صوتي</option>
                        </select>
                    </div> -->
                </div>

                <!-- <div class="form-group">
                    <label class="form-label" for="reference_sample_id"><i class="fas fa-bookmark"></i> اختيار مثال (اختياري)</label>
                    <select class="form-control" id="reference_sample_id" name="reference_sample_id">
                        <option value="">بدون مرجع — عمل جديد بالكامل</option>
                        {% for sample in samples %}
                            <option value="{{ sample.id }}" {% if ref_sample_id and ref_sample_id|string == sample.id|string %}selected{% endif %}>
                                {{ sample.title }}
                            </option>
                        {% endfor %}
                    </select>
                </div> -->

                <div class="form-group">
                    <label class="form-label" for="details"><i class="fas fa-align-right"></i> تفاصيل إضافية</label>
                    <textarea class="form-control" id="details" name="details"
                              placeholder="أي تفاصيل إضافية ترغب في إضافتها — كلمات معينة، أسلوب محدد، ملاحظات..."></textarea>
                </div>

                <!-- <div class="form-group">
                    <label class="form-label" for="whatsapp_number"><i class="fab fa-whatsapp"></i> رقم الواتساب للتواصل *</label>
                    <input type="tel" class="form-control" id="whatsapp_number" name="whatsapp_number" required
                           placeholder="05XXXXXXXX" dir="ltr" style="text-align: left;">
                </div> -->

                {% if current_user.is_authenticated %}
                    <div class="form-actions">
                        <button type="submit" name="order_method" value="database" class="btn btn-primary btn-lg btn-block">
                            <i class="fas fa-paper-plane"></i> إرسال الطلب
                        </button>
                    </div>
                    <div class="form-divider"></div>
                    <!--  <div class="form-divider">أو</div>
                   <div class="form-actions">
                        <button type="submit" name="order_method" value="whatsapp" class="btn btn-whatsapp btn-lg btn-block">
                            <i class="fab fa-whatsapp"></i> إرسال عبر واتساب
                        </button>
                    </div> -->
                {% else %}
                    <div class="form-actions">
                        <button type="submit" name="order_method" value="whatsapp" class="btn btn-whatsapp btn-lg btn-block">
                            <i class="fab fa-whatsapp"></i> طلب عبر واتساب
                        </button>
                    </div>
                    <p style="text-align: center; font-size: var(--fs-sm); color: var(--text-tertiary); margin-top: var(--space-lg);">
                        <a href="{{ url_for('auth.register') }}"><i class="fas fa-user-plus"></i> سجل حساب</a> لتتمكن من متابعة حالة طلبك
                    </p>
                {% endif %}
            </form>
        </div>
    </div>
</section>
{% endblock %}
